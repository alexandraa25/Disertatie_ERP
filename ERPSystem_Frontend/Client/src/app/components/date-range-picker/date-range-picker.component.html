<div class="picker-container">

    <div class="trigger" (click)="toggle()">
        {{ from ? (from | date:'shortDate') : 'De la' }}
        -
        {{ to ? (to | date:'shortDate') : 'Până la' }}
    </div>

    <div class="dropdown" *ngIf="isOpen">
        <mat-tab-group>
            <mat-tab label="Interval de date">
                <div class="content">

                    <div class="presets">
                        <button *ngFor="let p of presets" [class.active]="selectedPreset === p.key"
                            (click)="selectPreset(p.key)">
                            {{ p.label }}
                        </button>
                    </div>

                    <mat-form-field appearance="outline">
                        <mat-date-range-input [rangePicker]="picker" [max]="today">
                            <input matStartDate [(ngModel)]="tempFrom" (dateChange)="onManualChange()">
                            <input matEndDate [(ngModel)]="tempTo" (dateChange)="onManualChange()">
                        </mat-date-range-input>

                        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
                        <mat-date-range-picker #picker></mat-date-range-picker>
                    </mat-form-field>
                </div>
            </mat-tab>

            <mat-tab label="Timp real">
                <div class="content">

                    <div class="presets">
                        <button [class.active]="selectedPreset === 'rt-0'" (click)="selectRealtimePreset(0)">
                            Acum
                        </button>

                        <button [class.active]="selectedPreset === 'rt-60'" (click)="selectRealtimePreset(60)">
                            Ultima oră
                        </button>

                        <button [class.active]="selectedPreset === 'rt-180'" (click)="selectRealtimePreset(180)">
                            Ultimele 3 ore
                        </button>

                        <button [class.active]="isCustomMode" (click)="activateCustom()">
                            Personalizat
                        </button>
                    </div>

                    <div class="custom" *ngIf="isCustomMode">
                        <span>Ultimele</span>

                        <input type="number" [(ngModel)]="customValue">

                        <select [(ngModel)]="customUnit">
                            <option value="minutes">Minute</option>
                            <option value="hours">Ore</option>
                        </select>

                        <button class="secondary" (click)="applyRealtime()">Aplică</button>
                    </div>

                    <div class="preview" *ngIf="tempFrom && tempTo">
                        ⏱ {{ tempFrom | date:'shortTime' }} → {{ tempTo | date:'shortTime' }}
                    </div>

                </div>
            </mat-tab>

        </mat-tab-group>

        <div class="actions">
            <button class="cancel" (click)="cancel()">Anulează</button>

            <button class="clear"  *ngIf="from || to" (click)="clear()">Șterge</button>

            <button class="apply" [disabled]="!tempFrom || !tempTo" (click)="apply()">
                Aplică intervalul
            </button>
        </div>
    </div>
</div>
