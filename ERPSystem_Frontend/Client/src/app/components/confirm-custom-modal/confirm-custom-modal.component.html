<div class="overlay" *ngIf="confirmService.isOpen" (click)="close(false)">
  <div class="modal" (click)="$event.stopPropagation()">

    <h2>{{ confirmService.title }}</h2>

    <p>{{ confirmService.message }}</p>

    <div class="actions">
      <button class="btn-cancel" (click)="close(false)">
        Cancel
      </button>

      <button class="btn-confirm" (click)="close(true)">
        Confirm
      </button>
    </div>

  </div>
</div>
