<nav class="navbar">

  <div class="navbar-container">

    <!-- LOGO -->
    <a routerLink="/dashboard" class="logo">
      ERP
    </a>

    <!-- MOBILE BUTTON -->
    <button class="menu-btn" (click)="isMenuOpen = !isMenuOpen">
      <span class="menu-icon" [class.open]="isMenuOpen"></span>
    </button>

    <!-- NAVIGATION -->
    <ul class="nav-links" [class.open]="isMenuOpen">

      <!-- GUEST -->
      <ng-container *ngIf="!user">

        <li>
          <a routerLink="/login" (click)="isMenuOpen=false">
            Login
          </a>
        </li>

        <li>
          <a routerLink="/register" (click)="isMenuOpen=false">
            Register
          </a>
        </li>

      </ng-container>

      <!-- AUTHENTICATED -->
      <ng-container *ngIf="user">

        <!-- DYNAMIC MENU -->
        <ng-container *ngFor="let group of menuGroups">
          <li class="nav-dropdown" *ngIf="canSeeGroup(group)" (mouseenter)="openDropdown(group.label)"
            (mouseleave)="closeDropdownWithDelay()">
            <button type="button" class="dropdown-trigger">
              {{ group.label }} ▾
            </button>

            <ul class="dropdown-menu" [class.open]="activeDropdown === group.label">
              <li *ngFor="let item of group.children">
                <a *ngIf="canSee(item)" [routerLink]="item.route" routerLinkActive="active-link"
                  (click)="activeDropdown=null; isMenuOpen=false">
                  {{ item.label }}
                </a>
              </li>
            </ul>
          </li>
        </ng-container>

        <!-- PROFILE -->
        <li>
          <a (click)="goToProfile(); isMenuOpen=false">
            Profil
          </a>
        </li>

        <!-- LOGOUT -->
        <li>
          <a (click)="logout(); isMenuOpen=false">
            Logout
          </a>
        </li>

      </ng-container>

    </ul>

    <!-- NOTIFICATIONS -->
    <div class="navbar-notifications">


      <button type="button" class="notification-bell" (click)="toggleNotifications()">
        🔔

        <span *ngIf="unreadCount > 0" class="notification-badge">
          {{ unreadCount }}
        </span>
      </button>

      <div *ngIf="notificationsOpen" class="notifications-dropdown">

        <div class="notifications-dropdown-header">

          <div>
            <h3>Notificări</h3>
            <span>{{ unreadCount }} necitite</span>
          </div>

          <button *ngIf="unreadCount > 0" type="button" (click)="markAllAsRead()">
            Marchează toate ca citite
          </button>

        </div>

        <div *ngIf="notifications.length === 0" class="empty-notifications">
          Nu ai notificări momentan.
        </div>

        <div *ngFor="let notification of notifications" class="notification-row" [class.unread]="!notification.isRead"
          [class.info]="notification.type === 'Info'" [class.success]="notification.type === 'Success'"
          [class.warning]="notification.type === 'Warning'" [class.error]="notification.type === 'Error'"
          (click)="openNotification(notification)">

          <div class="notification-icon">
            {{ getNotificationIcon(notification.type) }}
          </div>

          <div class="notification-content">

            <div class="notification-title-row">
              <strong>{{ notification.title }}</strong>

              <span *ngIf="!notification.isRead" class="notification-dot"></span>
            </div>

            <p>{{ notification.message }}</p>

            <span class="notification-time">
              {{ getTimeAgo(notification.createdAt) }}
            </span>

          </div>

        </div>

      </div>


    </div>

  </div>

</nav>
