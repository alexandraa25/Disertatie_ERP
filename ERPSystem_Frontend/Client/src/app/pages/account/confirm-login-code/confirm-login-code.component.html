<div class="verify-wrapper">

  <div class="verify-card">
    <h3>Introdu codul de verificare</h3>
    <p class="subtitle">Am trimis un cod din 6 cifre pe email</p>

    <form [formGroup]="codeForm" (ngSubmit)="onSubmit()">

      <div class="code-inputs">
        <input maxlength="1" class="code-box"
               *ngFor="let c of codeControls; let i = index"
               [formControlName]="c"
               (input)="moveToNext($event, i)" 
               (paste)="handlePaste($event)"
               (keydown.backspace)="moveToPrev($event, i)">
      </div>

      <button type="submit" class="btn-submit">
        Verifică codul
      </button>

      <div class="extra-links center">
        <span>Nu ai primit codul?</span>
        <span class="clickable" (click)="resend()">Retrimite</span>
      </div>

    </form>
  </div>

</div>

<div class="loading-overlay" *ngIf="isLoading">
  <div class="spinner"></div>
  <span class="loading-text">Se verifică...</span>
</div>
