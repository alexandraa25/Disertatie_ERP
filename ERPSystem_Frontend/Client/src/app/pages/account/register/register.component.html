<div class="register-page">

  <div class="register-card">

    <div class="register-header">
      <h3>Creare utilizator</h3>
      <p>Completează datele pentru a crea un cont nou</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <div class="form-row">
        <div class="form-group">
          <i class="fas fa-user icon-inside"></i>
          <input type="text" formControlName="username" placeholder="Nume utilizator">
        </div>

        <div class="form-group">
          <i class="fas fa-envelope icon-inside"></i>
          <input type="email" formControlName="emailAddress" placeholder="Email">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <i class="fas fa-id-card icon-inside"></i>
          <input type="text" formControlName="firstName" placeholder="Prenume">
        </div>

        <div class="form-group">
          <i class="fas fa-id-badge icon-inside"></i>
          <input type="text" formControlName="lastName" placeholder="Nume">
        </div>
      </div>

      <div class="form-group">
        <i class="fas fa-phone icon-inside"></i>
        <input type="text" formControlName="phoneNumber" placeholder="Număr de telefon">
      </div>

      <div class="form-row align-center">

        <div class="form-group">
          <i class="fas fa-user-shield icon-inside"></i>

          <select formControlName="role">
            <option value="" disabled>Selectează rolul</option>
            <option *ngFor="let role of roles" [value]="role.name">
              {{ role.name }}
            </option>
          </select>
        </div>

        <label class="checkbox-container inline">
          <input type="checkbox" formControlName="isActive">
          <span>Cont activ</span>
        </label>

      </div>

      <div class="job-info" *ngIf="jobTitleFromQuery">
        Funcție HR: <strong>{{ jobTitleFromQuery }}</strong>
      </div>

      <button type="submit" class="btn-submit" [disabled]="!registerForm.valid || isLoading">
        Creează utilizator
      </button>

    </form>

  </div>

</div>

<div class="loading-overlay" *ngIf="isLoading">
  <div class="spinner"></div>
</div>
