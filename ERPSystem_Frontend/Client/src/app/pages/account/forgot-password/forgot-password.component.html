<div class="forgot-wrapper">

  <div class="forgot-card">
    <h3>Resetare parolă</h3>
    <p class="subtitle">Introdu adresa de email pentru a primi link-ul de resetare</p>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <i class="fas fa-envelope icon-inside"></i>
        <input formControlName="email" placeholder="Email" />
      </div>

      <button type="submit" class="btn-submit">Trimite link de resetare</button>

      <div class="extra-links center">
        <span class="clickable" (click)="goBack()">Înapoi la autentificare</span>
      </div>

    </form>
  </div>

</div>

<div class="loading-overlay" *ngIf="isLoading">
  <div class="spinner"></div>
  <span class="loading-text">Se trimite...</span>
</div>
