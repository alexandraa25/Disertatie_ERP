<div class="reset-wrapper">

  <div class="reset-card">
    <h3>Resetare parolă</h3>

    <form [formGroup]="resetForm" (ngSubmit)="submit()">

      <div class="form-group password-group">
        <input [type]="showNewPassword ? 'text' : 'password'" formControlName="newPassword" placeholder="Parolă nouă" />

        <span class="password-toggle" (click)="toggleNewPassword()">
          <svg *ngIf="showNewPassword" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24">
            <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              d="M1 12s4-7 11-7s11 7 11 7s-4 7-11 7s-11-7-11-7zm11 3a3 3 0 1 1 0-6a3 3 0 0 1 0 6z" />
          </svg>

          <svg *ngIf="!showNewPassword" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24">
            <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              d="M17.94 17.94C16.2 19.24 14.21 20 12 20c-7 0-11-8-11-8a21.83 21.83 0 0 1 5.06-6.61m3.6-2.02A11.19 11.19 0 0 1 12 4c7 0 11 8 11 8a21.6 21.6 0 0 1-3.21 4.49M1 1l22 22" />
          </svg>
        </span>
      </div>

      <div class="form-group password-group">
        <input [type]="showConfirmPassword ? 'text' : 'password'" formControlName="confirmPassword"
          placeholder="Confirmă parola" [class.input-error]="
    resetForm.errors?.['passwordsMismatch'] &&
    resetForm.get('confirmPassword')?.touched
  " />

        <span class="password-toggle" (click)="toggleConfirmPassword()">
          <svg *ngIf="showConfirmPassword" xmlns="http://www.w3.org/2000/svg" width="22" height="22"
            viewBox="0 0 24 24">
            <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              d="M1 12s4-7 11-7s11 7 11 7s-4 7-11 7s-11-7-11-7zm11 3a3 3 0 1 1 0-6a3 3 0 0 1 0 6z" />
          </svg>

          <svg *ngIf="!showConfirmPassword" xmlns="http://www.w3.org/2000/svg" width="22" height="22"
            viewBox="0 0 24 24">
            <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              d="M17.94 17.94C16.2 19.24 14.21 20 12 20c-7 0-11-8-11-8a21.83 21.83 0 0 1 5.06-6.61m3.6-2.02A11.19 11.19 0 0 1 12 4c7 0 11 8 11 8a21.6 21.6 0 0 1-3.21 4.49M1 1l22 22" />
          </svg>
        </span>

        <div class="error-message" *ngIf="
    resetForm.errors?.['passwordsMismatch'] &&
    resetForm.get('confirmPassword')?.touched
  ">
          Parolele nu coincid.
        </div>
      </div>

      <button type="submit" class="btn-submit">
        Resetează parola
      </button>

    </form>
  </div>

</div>

<div class="loading-overlay" *ngIf="isLoading">
  <div class="spinner"></div>
</div>
