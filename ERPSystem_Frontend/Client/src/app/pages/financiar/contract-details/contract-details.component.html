<div *ngIf="loading" class="loading">
  Se încarcă contract...
</div>

<div class="section contract-section">

  <div class="section-header">
    <h3>📄 Conținut Contract</h3>

    <button *ngIf="contract.status === 'Draft' && !isEditingBody"
            class="edit-btn"
            type="button"
            (click)="startEditBody()">
      ✏️ Editează
    </button>
  </div>

  <!-- VIEW -->
  <div *ngIf="!isEditingBody">
    <pre class="contract-body">
{{ contract.contractBody || 'Conținut necompletat' }}
    </pre>
  </div>

  <div class="section signatures-section" *ngIf="contract">

  <div class="section-header">
    <h3>✍️ Semnături</h3>
  </div>

  <div class="signatures-grid">

    <!-- CLIENT -->
    <div class="signature-box">
      <h4>Client</h4>

      <img *ngIf="contract.clientSignature"
           [src]="contract.clientSignature"
           class="signature-img" />

      <div *ngIf="!contract.clientSignature" class="no-sign">
        Nesemnat
      </div>

      <div class="sign-date" *ngIf="contract.clientSignedAtUtc">
        Semnat la:
        {{ contract.clientSignedAtUtc | date:'dd.MM.yyyy HH:mm' }}
      </div>
    </div>

    <!-- ADMIN -->
    <div class="signature-box">
      <h4>Administrator</h4>

      <img *ngIf="contract.adminSignature"
           [src]="contract.adminSignature"
           class="signature-img" />

      <div *ngIf="!contract.adminSignature" class="no-sign">
        Nesemnat
      </div>

      <div class="sign-date" *ngIf="contract.adminSignedAtUtc">
        Semnat la:
        {{ contract.adminSignedAtUtc | date:'dd.MM.yyyy HH:mm' }}
      </div>
    </div>

  </div>
</div>

  <!-- EDIT -->
  <div *ngIf="isEditingBody" class="body-edit">
    <textarea [(ngModel)]="editedBody"
              class="editor">
    </textarea>

    <div class="edit-actions">
      <button class="primary"
              type="button"
              (click)="saveBody()">
        💾 Salvează
      </button>

      <button class="secondary"
              type="button"
              (click)="cancelEditBody()">
        ❌ Anulează
      </button>
    </div>
  </div>

</div>

<!-- WORKFLOW BUTTONS -->

<div class="actions">

  <button *ngIf="contract.status === 'Draft'" (click)="finalize()" [disabled]="actionLoading">
    Finalizează
  </button>

  <button *ngIf="contract.status === 'Finalized'" (click)="sign()" [disabled]="actionLoading">
    Semnează
  </button>

  <button *ngIf="contract.status === 'Signed'" (click)="activate()" [disabled]="actionLoading">
    Activează
  </button>

  <!-- <button *ngIf="contract.status !== 'Cancelled'" class="danger" (click)="cancel()" [disabled]="actionLoading">
    Anulează
  </button> -->

</div>
