<div class="signature-modal">

  <div class="signature-card">

    <!-- 🔴 buton închidere -->
    <!--<button class="close-btn" (click)="close()">✖</button>-->

    <h2>✍️ Semnătura administratorului</h2>

    <!-- 🔥 IMPORTANT: scoatem width/height -->
    <canvas
      #canvas
      class="signature-canvas"
      (mousedown)="startDrawing($event)"
      (mousemove)="draw($event)"
      (mouseup)="stopDrawing()"
      (mouseleave)="stopDrawing()">
    </canvas>

    <div class="signature-hint">
      Desenați semnătura în zona de mai sus
    </div>

    <div class="signature-actions">
      <button class="btn-clear" (click)="clear()">🗑 Șterge</button>

      <button
        class="btn-sign"
        [disabled]="loading || !hasSignature()"
        (click)="sign()">
        ✍️ Semnează
      </button>
    </div>

    <!-- ✅ mesaj succes -->
    <div *ngIf="signed" class="signature-success">
      ✔ Semnătură salvată cu succes!
    </div>

  </div>

</div>
